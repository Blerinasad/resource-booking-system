services:
  mysql:
    image: mysql:8.0
    container_name: smart_booking_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: smart_booking_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smart_booking_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smart_booking_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./services/auth-service/.env
    depends_on:
      mysql:
        condition: service_healthy

  resource-service:
    build:
      context: ./services/resource-service
    container_name: resource-service
    restart: always
    ports:
      - "5002:5002"
    env_file:
      - ./services/resource-service/.env
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  booking-analytics-service:
    build:
      context: ./services/booking-analytics-service
    container_name: booking-analytics-service
    restart: always
    ports:
      - "5003:5003"
    env_file:
      - ./services/booking-analytics-service/.env
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
      kafka:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - auth-service
      - resource-service
      - booking-analytics-service

volumes:
  mysql_data:
  mongo_data: